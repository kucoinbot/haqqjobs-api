<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account — AbayJobs</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; }

nav { background: #0f1923; padding: 0 1.5rem; display: flex; justify-content: space-between; align-items: center; height: 58px; position: sticky; top: 0; z-index: 100; }
.logo { color: white; font-size: 1.3rem; font-weight: 700; text-decoration: none; }
.logo span { color: #4ade80; }
.nav-links { display: flex; gap: 1rem; align-items: center; }
.nav-links a { color: rgba(255,255,255,0.7); font-size: 13px; text-decoration: none; }
.nav-links a:hover { color: white; }

.wrap { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

.account-header { background: linear-gradient(135deg, #0f1923, #1a2d1a); border-radius: 14px; padding: 1.75rem; color: white; margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
.account-header h1 { font-size: 1.4rem; margin-bottom: 4px; }
.account-header p { font-size: 13px; color: rgba(255,255,255,0.6); }
.access-badge { background: rgba(74,222,128,0.15); color: #4ade80; font-size: 12px; padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(74,222,128,0.3); font-weight: 600; }
.access-badge.locked { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.2); }

.tabs { display: flex; border-bottom: 2px solid #e8e8e3; margin-bottom: 1.25rem; }
.tab { padding: 9px 18px; font-size: 14px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px; }
.tab.active { color: #0f1923; font-weight: 600; border-bottom-color: #4ade80; }

.scard { background: white; border: 1px solid #e8e8e3; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
.empty-state { text-align: center; padding: 2.5rem 1rem; color: #888; }
.empty-state .icon { font-size: 2rem; margin-bottom: 0.75rem; }

.app-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #f0f0eb; }
.app-row:last-child { border-bottom: none; }
.app-title { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
.app-meta { font-size: 12px; color: #888; }
.app-status { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; }
.status-sent { background: #eff6ff; color: #1e40af; }

.info-box { background: #e1f5ee; border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #0f6e56; margin-bottom: 1rem; }
.btn-unlock { padding: 10px 22px; background: #4ade80; color: #0a1a0a; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; }

.fg { margin-bottom: 1rem; }
.fg label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 5px; }
.fg input { width: 100%; padding: 10px 13px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
.btn-save { padding: 10px 22px; background: #0f1923; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">Abay<span>Jobs</span></a>
  <div class="nav-links">
    <a href="/">← Back to jobs</a>
  </div>
</nav>

<div class="wrap">
  <div class="account-header">
    <div>
      <h1 id="welcome-name">Welcome back</h1>
      <p id="welcome-email">Loading your account...</p>
    </div>
    <span id="access-status" class="access-badge locked">No account loaded</span>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('applications', this)">My Applications</div>
    <div class="tab" onclick="switchTab('saved', this)">Saved Jobs</div>
    <div class="tab" onclick="switchTab('settings', this)">Account Settings</div>
  </div>

  <div id="panel-applications">
    <div class="scard">
      <div id="app-list">
        <div class="empty-state">
          <div class="icon">📋</div>
          <p>You haven't applied to any jobs yet.</p>
          <p style="font-size:12px;margin-top:6px;"><a href="/" style="color:#0f6e56;">Browse live jobs →</a></p>
        </div>
      </div>
    </div>
  </div>

  <div id="panel-saved" style="display:none">
    <div class="scard">
      <div class="empty-state">
        <div class="icon">⭐</div>
        <p>No saved jobs yet.</p>
        <p style="font-size:12px;margin-top:6px;"><a href="/" style="color:#0f6e56;">Browse live jobs →</a></p>
      </div>
    </div>
  </div>

  <div id="panel-settings" style="display:none">
    <div class="scard">
      <div class="info-box" id="settings-info">£20/year membership · Full access to apply for jobs</div>
      <div class="fg"><label>Full name</label><input type="text" id="set-name" /></div>
      <div class="fg"><label>Email address</label><input type="email" id="set-email" /></div>
      <div class="fg"><label>Phone number</label><input type="tel" id="set-phone" /></div>
      <button class="btn-save" onclick="saveSettings()">Save changes</button>
    </div>
  </div>
</div>

<script>
// This dashboard reads the account that was created on the main
// page during this browser session (stored in sessionStorage so
// it survives navigating between pages, but not a real backend
// account yet — see note in chat about adding persistent storage).
function loadAccount() {
  var raw = sessionStorage.getItem('abayjobs_user');
  var hasAccess = sessionStorage.getItem('abayjobs_access') === 'true';

  if (!raw) {
    document.getElementById('welcome-name').textContent = 'No account found';
    document.getElementById('welcome-email').textContent = 'Please sign up or sign in from the homepage first.';
    return;
  }

  var user = JSON.parse(raw);
  document.getElementById('welcome-name').textContent = 'Welcome, ' + user.name;
  document.getElementById('welcome-email').textContent = user.email;
  document.getElementById('set-name').value = user.name || '';
  document.getElementById('set-email').value = user.email || '';
  document.getElementById('set-phone').value = user.phone || '';

  var badge = document.getElementById('access-status');
  if (hasAccess) {
    badge.textContent = '✓ Full access active';
    badge.className = 'access-badge';
  } else {
    badge.textContent = 'Payment pending';
    badge.className = 'access-badge locked';
  }
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('panel-applications').style.display = tab === 'applications' ? 'block' : 'none';
  document.getElementById('panel-saved').style.display = tab === 'saved' ? 'block' : 'none';
  document.getElementById('panel-settings').style.display = tab === 'settings' ? 'block' : 'none';
}

function saveSettings() {
  var raw = sessionStorage.getItem('abayjobs_user');
  var user = raw ? JSON.parse(raw) : {};
  user.name = document.getElementById('set-name').value.trim();
  user.email = document.getElementById('set-email').value.trim();
  user.phone = document.getElementById('set-phone').value.trim();
  sessionStorage.setItem('abayjobs_user', JSON.stringify(user));
  alert('Settings saved for this session.');
  loadAccount();
}

loadAccount();
</script>
</body>
</html>
